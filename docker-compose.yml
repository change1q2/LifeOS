services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: lifeos-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - lifeos-data:/app/server/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=lifeos_docker_secret_2026
    networks:
      - lifeos-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: lifeos-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - lifeos-net

volumes:
  lifeos-data:

networks:
  lifeos-net:
    driver: bridge
